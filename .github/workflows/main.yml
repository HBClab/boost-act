name: act-workflow
on:
  push:
    branches:
      - main
      - dev
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  issues: write
  id-token: write
  pages: write

jobs:
  install-reqs-n-run-scripts:
    name: install-py-reqs
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: set up python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: install pyreqs
        run: pip install -r requirements.txt

    name: install-r-reqs
    runs-on: ubuntu-latest

    steps:
      - name: set up R
        uses: r-lib/actions/setup-r@v2

      - name: install rreqs
        run: Rscript ./R_requirements.R


  name: run orchestrator
  runs-on: ubuntu-latest

  steps:
      - name: run orchestrator
        run: current_date=$(date +"%Y-%m-%d")\
          python3 ./code/orchestrate.py -i '/Volumes/VossLab/Repositories/Accelerometer_Data/' -token 'DE4E2DB72778DACA9B8848574107D2F5P' | tee > ./out/log-{}.txt'

      - name: checkout code
        uses: actions/checkout@v4


