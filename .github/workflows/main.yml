name: act-workflow

on:
  push:
    branches:
      - main
      - dev
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  issues: write
  id-token: write
  pages: write

jobs:
  run-everything:
    name: run everything all at once
    runs-on: ubuntu-latest
    steps:

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: dev

      - name: debug env
        run: |
          echo "current wkdir:"
          pwd
          echo "files in wkdir:"
          ls -al

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Python requirements
        run: pip install -r requirements.txt

      - name: debug env
        run: |
          echo "current wkdir:"
          pwd
          echo "files in dir"
          ls -a

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install R requirements
        run: Rscript R_requirements.R

      - name: Run orchestrator script
        run: |
          current_date=$(date +"%Y-%m-%d")
          python3 ./code/orchestrate.py -i '/Volumes/VossLab/Repositories/Accelerometer_Data/' -token 'DE4E2DB72778DACA9B8848574107D2F5P' | tee ./out/log-${current_date}.txt
